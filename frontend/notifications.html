<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Nexus Pay — Notifications</title>
  <link rel="icon" href="logo_nexus.png">   
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--primary:#1a4cff;--secondary:#7b3fe4;--success:#00b38a;--danger:#ff5e7c;--warning:#fdb24d;--gray:#6e7687;--gray-light:#e9ecf2;--light:#f5f7fd;--white:#fff;--dark:#121826;--gradient:linear-gradient(145deg,#1a4cff,#7b3fe4);--shadow-sm:0 4px 12px rgba(0,0,0,.04);--radius:16px}
    body{font-family:'Inter',sans-serif;background:var(--light);color:var(--dark);min-height:100vh;display:flex}
    .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
    .topbar{background:var(--white);padding:1.25rem 2rem;border-bottom:1px solid var(--gray-light);box-shadow:var(--shadow-sm);display:flex;align-items:center;justify-content:space-between}
    .topbar h1{font-size:1.3rem;font-weight:800}.topbar p{color:var(--gray);font-size:.85rem;margin-top:.1rem}
    .btn-ghost{padding:.6rem 1.1rem;background:transparent;border:1.5px solid var(--gray-light);color:var(--gray);font-size:.82rem;font-weight:600;border-radius:10px;cursor:pointer;transition:all .18s}
    .btn-ghost:hover{border-color:var(--primary);color:var(--primary)}
    .content{flex:1;overflow-y:auto;padding:2rem}
    .filter-bar{display:flex;gap:.5rem;margin-bottom:1.5rem;flex-wrap:wrap}
    .filter-btn{padding:.4rem .9rem;font-size:.8rem;font-weight:600;border-radius:20px;border:1.5px solid var(--gray-light);background:transparent;color:var(--gray);cursor:pointer;transition:all .18s}
    .filter-btn:hover,.filter-btn.active{background:rgba(26,76,255,.08);border-color:var(--primary);color:var(--primary)}
    .notif-list{display:flex;flex-direction:column;gap:.75rem}
    .notif-item{background:var(--white);border:1px solid var(--gray-light);border-radius:var(--radius);padding:1.1rem 1.25rem;display:flex;align-items:flex-start;gap:1rem;box-shadow:var(--shadow-sm);transition:transform .18s,box-shadow .18s}
    .notif-item:hover{transform:translateX(3px);box-shadow:0 8px 24px rgba(26,76,255,.08)}
    .notif-item.unread{border-left:3.5px solid var(--primary)}
    .ni-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0}
    .ni-body{flex:1}
    .ni-title{font-size:.9rem;font-weight:600;margin-bottom:.2rem}
    .ni-desc{font-size:.8rem;color:var(--gray);line-height:1.55}
    .ni-time{font-size:.72rem;color:var(--gray);margin-top:.4rem;display:flex;align-items:center;gap:.3rem}
    .ni-right{display:flex;flex-direction:column;align-items:flex-end;gap:.5rem;flex-shrink:0}
    .ni-badge{font-size:.68rem;font-weight:700;padding:.18rem .55rem;border-radius:20px}
    .unread-dot{width:8px;height:8px;background:var(--primary);border-radius:50%}
    @media(max-width:780px){.content{padding:1rem}}
  </style>
</head>
<body>
  
  <div class="main">
    <div class="topbar">
      <div><h1>Notifications</h1><p>Your alerts and activity updates</p></div>
      <div>
        <button class="btn-ghost" onclick="markAllRead()"><i class="fas fa-check-double"></i> Mark all read</button>
        <button class="btn-ghost" onclick="clearNotifications()" style="margin-left:0.5rem;color:var(--danger);border-color:rgba(255,94,124,0.2)"><i class="fas fa-trash-alt"></i> Clear all</button>
      </div>
    </div>
    <div class="content">
      <div class="filter-bar">
        <button class="filter-btn active" onclick="filter('all',this)">All</button>
        <button class="filter-btn" onclick="filter('transaction',this)">Transactions</button>
        <button class="filter-btn" onclick="filter('security',this)">Security</button>
        <button class="filter-btn" onclick="filter('system',this)">System</button>
      </div>
      <div class="notif-list" id="notifList"></div>
    </div>
  </div>
<script src="notifications.js"></script>
<script>
  const token=localStorage.getItem('token');
  if(!token)window.location.href='login.html';

  function loadNotifications() {
    const list = NexusNotif.getAll();
    renderNotifications(list);
  }

  function renderNotifications(list) {
    const container = document.getElementById('notifList');
    if (!list || !list.length) {
      container.innerHTML = '<div style="padding:4rem 2rem;text-align:center;color:var(--gray)"><i class="fas fa-bell-slash" style="font-size:3rem;margin-bottom:1rem;opacity:0.3"></i><p>No notifications yet</p></div>';
      return;
    }

    container.innerHTML = list.map(n => {
      let icon = 'fa-bell';
      let color = 'var(--primary)';
      let bg = 'rgba(26,76,255,0.1)';
      
      if (n.type === 'transaction' || n.type === 'payment') { 
          icon = 'fa-exchange-alt'; 
          color = 'var(--success)'; 
          bg = 'rgba(0,179,138,0.1)'; 
      }
      else if (n.type === 'alert') { 
          icon = 'fa-exclamation-triangle'; 
          color = 'var(--warning)'; 
          bg = 'rgba(253,178,77,0.1)'; 
      }
      else if (n.type === 'reminder') { 
          icon = 'fa-calendar-check'; 
          color = 'var(--secondary)'; 
          bg = 'rgba(123,63,228,0.1)'; 
      }
      else if (n.type === 'security') { 
          icon = 'fa-shield-alt'; 
          color = 'var(--danger)'; 
          bg = 'rgba(255,94,124,0.1)'; 
      }

      return `
        <div class="notif-item ${!n.read ? 'unread' : ''}" onclick="markAsRead('${n.id}')">
          <div class="ni-icon" style="background:${bg};color:${color}"><i class="fas ${icon}"></i></div>
          <div class="ni-body">
            <div class="ni-title">${n.type.toUpperCase()}</div>
            <div class="ni-desc">${n.message}</div>
            <div class="ni-time"><i class="far fa-clock"></i> ${new Date(n.timestamp).toLocaleString()}</div>
          </div>
          <div class="ni-right">
            <div class="ni-badge" style="background:${bg};color:${color}">${n.type.toUpperCase()}</div>
            ${!n.read ? '<div class="unread-dot"></div>' : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  function filter(type, el) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    
    const all = NexusNotif.getAll();
    if (type === 'all') {
      renderNotifications(all);
    } else {
      renderNotifications(all.filter(n => n.type === type));
    }
  }

  function markAsRead(id) {
    NexusNotif.markAsRead(id);
    loadNotifications();
  }

  function markAllRead() {
    NexusNotif.markAllRead();
    loadNotifications();
  }

  function clearNotifications() {
    if(confirm('Are you sure you want to clear all notifications?')) {
        NexusNotif.clearAll();
        loadNotifications();
    }
  }

  loadNotifications();
  
</script>
  <script src="sidebar.js"></script>
</body>
</html>
